<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belgische Politiek Trivia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh}
  .container{max-width:720px;margin:0 auto;padding:16px}
  .header{text-align:center;padding:32px 0 24px}
  .header h1{font-size:2.6rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header .subtitle{font-size:1rem;color:#9ca3af}
  .header .flag{font-size:3rem;margin-bottom:8px}
  .card{background:#1a1a2e;border:2px solid #2a2a4a;border-radius:16px;padding:28px;margin-bottom:20px}
  .card h2{font-size:1.3rem;font-weight:700;color:#fbbf24;margin-bottom:14px}
  .btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .btn-grid-2{grid-template-columns:repeat(2,1fr)}
  .btn-grid-4{grid-template-columns:repeat(4,1fr)}
  .btn{padding:11px 14px;border-radius:10px;font-weight:600;font-size:.9rem;border:2px solid #3a3a5a;background:#2a2a4a;color:#fff;cursor:pointer;transition:all .15s;font-family:inherit}
  .btn:hover{border-color:#fbbf24;background:#2a2a4a}
  .btn.active{background:#fbbf24;color:#0f0f1a;border-color:#fbbf24}
  .btn-primary{width:100%;padding:16px;border-radius:12px;font-size:1.15rem;font-weight:900;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0f0f1a;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
  .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
  .btn-secondary{width:100%;padding:14px;border-radius:12px;font-size:1rem;font-weight:700;background:#2a2a4a;color:#fbbf24;border:2px solid #3a3a5a;cursor:pointer;font-family:inherit;margin-top:12px;transition:all .15s}
  .btn-secondary:hover{border-color:#fbbf24}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .option-btn{width:100%;padding:15px 18px;border-radius:12px;font-weight:600;font-size:.95rem;border:2px solid #3a3a5a;background:#2a2a4a;color:#fff;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;display:flex;align-items:center;justify-content:space-between}
  .option-btn:hover:not(.disabled){border-color:#fbbf24;background:#32325a}
  .option-btn.selected{background:#fbbf24;color:#0f0f1a;border-color:#fbbf24}
  .option-btn.correct{background:#34d399;color:#0f0f1a;border-color:#34d399}
  .option-btn.wrong{background:#ef4444;color:#fff;border-color:#ef4444}
  .option-btn.dimmed{background:#1a1a2e;color:#555;border-color:#2a2a3a}
  .option-btn.disabled{cursor:default}
  .option-letter{font-weight:900;margin-right:10px}
  .option-check{font-size:1.1rem}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .top-bar span{font-weight:700;color:#fbbf24;font-size:1rem}
  .progress-bar{width:100%;height:6px;background:#2a2a4a;border-radius:3px;margin-bottom:20px}
  .progress-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);border-radius:3px;transition:width .3s}
  .category-badge{display:inline-block;padding:4px 14px;background:#fbbf24;color:#0f0f1a;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:10px}
  .question-text{font-size:1.25rem;font-weight:700;line-height:1.5;margin-bottom:20px}
  .explanation{background:#1e3a2e;border:1px solid #34d399;border-radius:10px;padding:14px;margin-bottom:20px;font-size:.9rem;color:#a7f3d0;line-height:1.5}
  .explanation strong{color:#34d399}
  .score-big{font-size:3.5rem;font-weight:900;color:#fbbf24;margin-bottom:6px}
  .score-pct{font-size:1.4rem;font-weight:700;margin-bottom:12px}
  .score-msg{font-size:1.1rem;margin-bottom:28px}
  .result-item{padding:14px;border-radius:10px;border:2px solid;margin-bottom:10px;text-align:left}
  .result-item.correct{border-color:#34d399;background:rgba(52,211,153,.08)}
  .result-item.wrong{border-color:#ef4444;background:rgba(239,68,68,.08)}
  .result-item .q{font-weight:600;margin-bottom:5px;font-size:.95rem}
  .result-item .a{font-size:.85rem}
  .result-item .a.green{color:#34d399}
  .result-item .a.red{color:#ef4444}
  .result-item .expl{font-size:.8rem;color:#9ca3af;margin-top:4px;font-style:italic}
  .score-table{width:100%;border-collapse:collapse}
  .score-table th,.score-table td{padding:9px 10px;text-align:left;font-size:.85rem}
  .score-table th{color:#9ca3af;border-bottom:2px solid #2a2a4a;font-weight:600}
  .score-table td{border-bottom:1px solid #1a1a2e}
  .rank-1{color:#fbbf24;font-weight:900}
  .rank-2{color:#d1d5db;font-weight:700}
  .rank-3{color:#d97706;font-weight:700}
  .name-input{width:100%;padding:13px 16px;border-radius:10px;border:2px solid #3a3a5a;background:#2a2a4a;color:#fff;font-size:1rem;font-family:inherit;font-weight:600;margin-bottom:14px;outline:none;transition:border-color .15s}
  .name-input:focus{border-color:#fbbf24}
  .name-input::placeholder{color:#555}
  .text-center{text-align:center}
  .empty-state{text-align:center;padding:28px;color:#555;font-size:.95rem}
  .stats-row{display:flex;gap:12px;margin-bottom:20px}
  .stat-box{flex:1;background:#2a2a4a;border-radius:10px;padding:14px;text-align:center}
  .stat-box .num{font-size:1.8rem;font-weight:900;color:#fbbf24}
  .stat-box .label{font-size:.75rem;color:#9ca3af;margin-top:2px}
  @media(max-width:500px){.btn-grid{grid-template-columns:repeat(2,1fr)}.btn-grid-4{grid-template-columns:repeat(2,1fr)}.header h1{font-size:2rem}.question-text{font-size:1.1rem}.stats-row{flex-wrap:wrap}.stat-box{min-width:calc(50% - 6px)}}
</style>
</head>

const Q = [
  // === PARTIJEN & IDEOLOGIE ===

  {c:"Premiers",q:"Wie was de eerste premier van België?",o:["Erasme Surlet de Chokier","Félix de Muelenaere","Étienne de Sauvage","Joseph Lebeau"],a:0,d:3,e:"Erasme Surlet de Chokier was regent, maar de eerste echte premier was Étienne de Sauvage. Dit is een strikvraag — Surlet was regent, niet premier."},
  {c:"Premiers",q:"Wie was de langst regerende premier van België?",o:["Wilfried Martens","Jean-Luc Dehaene","Paul-Henri Spaak","Achille Van Acker"],a:0,d:2,e:"Wilfried Martens was premier van 1979 tot 1992, met een korte onderbreking — de langstdienende premier."},

  {c:"Premiers",q:"Wie was de eerste socialistische premier van België?",o:["Paul-Henri Spaak","Achille Van Acker","Elio Di Rupo","Louis Tobback"],a:1,d:3,e:"Achille Van Acker was de eerste socialistische premier (1945-1946)."},
  {c:"Premiers",q:"Elio Di Rupo was de eerste Franstalige premier sinds...",o:["Paul Vanden Boeynants (1978)","Edmond Leburton (1974)","Gaston Eyskens (1973)","Wilfried Martens (1992)"],a:0,d:3,e:"Elio Di Rupo (2011-2014) was de eerste Franstalige premier sinds Paul Vanden Boeynants."},

  {c:"Schandalen",q:"Het Agusta-schandaal draaide om smeergeld bij de aankoop van...",o:["Tanks","Helikopters","Gevechtsvliegtuigen","Fregatten"],a:1,d:2,e:"Het Agusta-schandaal (jaren '90) betrof smeergeld bij de aankoop van Agusta-helikopters voor het Belgisch leger."},

  {c:"Schandalen",q:"Het UPLACE-project was controversieel omdat...",o:["Het een kerncentrale was","Het een megashoppingcenter was nabij Brussel","Het een gevangenis was","Het een luchthaven was"],a:1,d:2,e:"UPLACE was een omstreden megashoppingcenter-project in Machelen dat uiteindelijk niet doorging."},
  {c:"Schandalen",q:"Welke politicus werd in het Kazachgate-schandaal genoemd?",o:["Didier Reynders","Armand De Decker","Charles Michel","Louis Michel"],a:1,d:3,e:"Armand De Decker (MR) werd beschuldigd van het lobbyen voor Kazachse zakenlui."},

  // === STAATSSTRUCTUUR ===
  {c:"Staatsstructuur",q:"Hoeveel gewesten heeft België?",o:["2","3","4","5"],a:1,d:1,e:"België heeft 3 gewesten: Vlaams Gewest, Waals Gewest en Brussels Hoofdstedelijk Gewest."},

const CATEGORY_MAP = {
  "Partijen":"🏛️","Premiers":"👔","Schandalen":"💣","Staatsstructuur":"🏗️",
  "Leiders":"👑","Verkiezingen":"🗳️","Koningshuis":"👸","Instellingen":"🏢",
  "Historisch":"📜","Vorming":"🤝","Lokaal":"🏘️","Europa":"🇪🇺",
  "Communautair":"🗣️","Recent":"📰"
};

const ALL_CATEGORIES = [...new Set(Q.map(q => q.c))];
const DIFF_LABELS = {1:"Makkelijk",2:"Gemiddeld",3:"Moeilijk"};
const NUM_OPTIONS = [10,15,20,30];

// ============================================================
// SCORE MANAGEMENT
// ============================================================
const SM = {
  scores: [],
  async load() {
    try {
      const r = await fetch('get_scores.php');
      if (r.ok) { const d = await r.json(); if (Array.isArray(d)) { this.scores = d; return; } }
    } catch(e) {}
    try { this.scores = JSON.parse(localStorage.getItem('bepol_scores') || '[]'); } catch(e) { this.scores = []; }
  },
  async save(entry) {
    this.scores.push(entry);
    this.scores.sort((a,b) => b.percentage - a.percentage || b.score - a.score);
    this.scores = this.scores.slice(0, 50);
    localStorage.setItem('bepol_scores', JSON.stringify(this.scores));
    try { await fetch('save_score.php', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry) }); } catch(e) {}
  },
  top(n=15) { return this.scores.slice(0,n); }
};

// ============================================================
// APP STATE
// ============================================================
const app = document.getElementById('app');
let S = {
  screen:'setup', cats:[], diff:0, num:15, questions:[], cur:0,
  sel:null, show:false, score:0, answers:[], name: localStorage.getItem('bepol_player')||''
};

function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function pick() {
  let pool = Q.filter(q => S.cats.includes(q.c));
  if (S.diff > 0) pool = pool.filter(q => q.d === S.diff);
  return shuffle(pool).slice(0, S.num);
}

function render() {
  switch(S.screen) {
    case 'setup': rSetup(); break;
    case 'playing': rPlay(); break;
    case 'results': rResults(); break;
    case 'board': rBoard(); break;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

// ---- SETUP ----
function rSetup() {
  const diffBtns = [{v:0,l:'Alle'},{v:1,l:'Makkelijk'},{v:2,l:'Gemiddeld'},{v:3,l:'Moeilijk'}];
  app.innerHTML = `
    <div class="header">
      <div class="flag">🇧🇪</div>
      <h1>Belgische Politiek Trivia</h1>
      <p class="subtitle">Test je kennis over Belgische politiekers, partijen, schandalen & meer!</p>
    </div>
    <div class="card">
      <h2>👤 Jouw naam</h2>
      <input class="name-input" id="ni" type="text" placeholder="Typ je naam..." value="${S.name}" maxlength="20">
    </div>
    <div class="card">
      <h2>📂 Categorieën <span style="font-size:.8rem;color:#9ca3af;font-weight:400">(${Q.length} vragen totaal)</span></h2>
      <div class="btn-grid">
        ${ALL_CATEGORIES.map(c => {
          const cnt = Q.filter(q=>q.c===c).length;
          return `<button class="btn ${S.cats.includes(c)?'active':''}" onclick="tCat('${c}')">${CATEGORY_MAP[c]||''} ${c} <span style="font-size:.7rem;opacity:.7">(${cnt})</span></button>`;
        }).join('')}
        <button class="btn ${S.cats.length===ALL_CATEGORIES.length?'active':''}" onclick="allCat()">✅ Alles</button>
      </div>
    </div>
    <div class="card">
      <h2>📊 Moeilijkheid</h2>
      <div class="btn-grid btn-grid-4">
        ${diffBtns.map(d => `<button class="btn ${S.diff===d.v?'active':''}" onclick="setD(${d.v})">${d.l}</button>`).join('')}
      </div>
    </div>
    <div class="card">
      <h2>🔢 Aantal vragen</h2>
      <div class="btn-grid btn-grid-4">
        ${NUM_OPTIONS.map(n => `<button class="btn ${S.num===n?'active':''}" onclick="setN(${n})">${n}</button>`).join('')}
      </div>
    </div>
    <button class="btn-primary" onclick="startG()">🚀 Start het spel</button>
    <button class="btn-secondary" onclick="showB()">🏆 Scorebord bekijken</button>
  `;
  document.getElementById('ni').addEventListener('input', e => { S.name=e.target.value; localStorage.setItem('bepol_player',S.name); });
}

window.tCat = c => { S.cats.includes(c)?S.cats=S.cats.filter(x=>x!==c):S.cats.push(c); render(); };
window.allCat = () => { S.cats = S.cats.length===ALL_CATEGORIES.length ? [] : [...ALL_CATEGORIES]; render(); };
window.setD = d => { S.diff=d; render(); };
window.setN = n => { S.num=n; render(); };

window.startG = () => {
  if(!S.cats.length){alert('Selecteer minstens één categorie!');return;}
  if(!S.name.trim()){alert('Vul je naam in!');return;}
  S.questions=pick();
  if(!S.questions.length){alert('Geen vragen beschikbaar voor deze combinatie!');return;}
  S.cur=0;S.sel=null;S.show=false;S.score=0;S.answers=[];S.screen='playing';render();
};

// ---- PLAYING ----
function rPlay() {
  const q=S.questions[S.cur];
  const pct=((S.cur)/S.questions.length*100).toFixed(0);
  const L=['A','B','C','D'];
  app.innerHTML = `
    <div class="top-bar">
      <span>Vraag ${S.cur+1} van ${S.questions.length}</span>
      <span>Score: ${S.score}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <span class="category-badge">${CATEGORY_MAP[q.c]||''} ${q.c} · ${DIFF_LABELS[q.d]||''}</span>
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${q.o.map((opt,i)=>{
          let cls='option-btn',chk='';
          if(S.show){
            cls+=' disabled';
            if(i===q.a){cls+=' correct';chk='✓';}
            else if(i===S.sel){cls+=' wrong';chk='✗';}
            else{cls+=' dimmed';}
          } else if(S.sel===i){cls+=' selected';}
          return `<button class="${cls}" ${S.show?'':'onclick="selO('+i+')"'}><span><span class="option-letter">${L[i]}.</span>${opt}</span><span class="option-check">${chk}</span></button>`;
        }).join('')}
      </div>
      ${S.show && q.e ? `<div class="explanation"><strong>💡 Uitleg:</strong> ${q.e}</div>` : ''}
      <button class="btn-primary" onclick="next()">
        ${!S.show?'✅ Controleer antwoord':S.cur+1>=S.questions.length?'🏁 Bekijk resultaten':'➡️ Volgende vraag'}
      </button>
    </div>
  `;
}

window.selO = i => { S.sel=i; render(); };

window.next = () => {
  if(S.sel===null){alert('Selecteer een antwoord!');return;}
  if(!S.show){S.show=true;render();return;}
  const q=S.questions[S.cur];
  const ok=S.sel===q.a;
  S.answers.push({qi:S.cur,sel:S.sel,correct:ok});
  if(ok)S.score++;
  if(S.cur+1<S.questions.length){S.cur++;S.sel=null;S.show=false;S.screen='playing';}
  else{
    S.screen='results';
    const p=Math.round((S.score/S.questions.length)*100);
    SM.save({name:S.name.trim(),score:S.score,total:S.questions.length,percentage:p,difficulty:S.diff===0?'Alle':DIFF_LABELS[S.diff],date:new Date().toISOString().split('T')[0]});
  }
  render();
};

// ---- RESULTS ----
function rResults() {
  const p=Math.round((S.score/S.questions.length)*100);
  let msg='📚 Blijf oefenen!';
  if(p>=90)msg='🏆 Expert! Je kent de Wetstraat als je broekzak!';
  else if(p>=70)msg='👍 Goed gedaan! Je volgt de politiek duidelijk.';
  else if(p>=50)msg='👌 Niet slecht, maar er is nog werk aan!';

  app.innerHTML = `
    <div class="header"><div class="flag">🇧🇪</div><h1>Resultaten</h1></div>
    <div class="card text-center">
      <div class="stats-row">
        <div class="stat-box"><div class="num">${S.score}</div><div class="label">Correct</div></div>
        <div class="stat-box"><div class="num">${S.questions.length-S.score}</div><div class="label">Fout</div></div>
        <div class="stat-box"><div class="num">${p}%</div><div class="label">Score</div></div>
      </div>
      <div class="score-msg">${msg}</div>
    </div>
    <div class="card">
      <h2>📋 Overzicht</h2>
      ${S.answers.map((ans,i)=>{
        const q=S.questions[ans.qi];
        return `<div class="result-item ${ans.correct?'correct':'wrong'}">
          <div class="q">${i+1}. ${q.q}</div>
          <div class="a ${ans.correct?'green':'red'}">Jouw antwoord: ${q.o[ans.sel]}</div>
          ${!ans.correct?`<div class="a green">Correct: ${q.o[q.a]}</div>`:''}
          ${q.e?`<div class="expl">💡 ${q.e}</div>`:''}
        </div>`;
      }).join('')}
    </div>
    <button class="btn-primary" onclick="S.screen='setup';render()">🔄 Opnieuw spelen</button>
    <button class="btn-secondary" onclick="showB()">🏆 Scorebord</button>
  `;
}

// ---- SCOREBOARD ----
window.showB = async () => { S.screen='board'; await SM.load(); rBoardView(); };
function rBoard() { SM.load().then(()=>rBoardView()); }
function rBoardView() {
  const top=SM.top(15);
  const rc=i=>i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
  app.innerHTML = `
    <div class="header"><div class="flag">🏆</div><h1>Scorebord</h1><p class="subtitle">Wie is de beste politieke kenner?</p></div>
    <div class="card">
      ${top.length?`
        <table class="score-table">
          <thead><tr><th>#</th><th>Speler</th><th>Score</th><th>%</th><th>Niveau</th><th>Datum</th></tr></thead>
          <tbody>${top.map((s,i)=>`
            <tr><td class="${rc(i)}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
            <td>${s.name}</td><td>${s.score}/${s.total}</td>
            <td style="color:#fbbf24;font-weight:700">${s.percentage}%</td>
            <td>${s.difficulty||'-'}</td><td>${s.date||'-'}</td></tr>
          `).join('')}</tbody>
        </table>
      `:'<div class="empty-state">Nog geen scores. Speel een spel!</div>'}
    </div>
    <button class="btn-primary" onclick="S.screen='setup';render()">⬅️ Terug naar menu</button>
    ${top.length?`<button class="btn-secondary" style="border-color:#ef4444;color:#ef4444" onclick="clrS()">🗑️ Scores wissen</button>`:''}
  `;
}
window.clrS = () => { if(confirm('Alle scores wissen?')){SM.scores=[];localStorage.removeItem('bepol_scores');rBoardView();} };

SM.load().then(()=>render());
</script>
</body>
</html>
